<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>webmcp-polyfill · browser demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; margin-top: 32px; color: #666; }
    .status { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 13px; color: white; }
    .status.connecting { background: #f59e0b; }
    .status.connected { background: #16a34a; }
    .status.disconnected { background: #dc2626; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow: auto; font-size: 13px; }
    .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
    input[type=text] { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 6px 12px; background: #2563eb; color: white; border: 0; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    ul { list-style: none; padding: 0; }
    li { padding: 6px 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h1>webmcp-polyfill · browser demo</h1>
  <p>状态：<span id="status" class="status connecting">connecting</span></p>
  <p style="font-size: 13px; color: #888;">浏览器作为 MCP host，通过 relay 暴露工具给 agent 调用</p>

  <h2>计数器（counter_*）</h2>
  <p>当前值：<strong id="counter">0</strong></p>

  <h2>待办（todo_*）</h2>
  <div class="row">
    <input id="todo-text" type="text" placeholder="输入待办内容后回车" />
    <button id="add-btn">添加</button>
  </div>
  <ul id="todo-list"></ul>

  <h2>调试日志</h2>
  <pre id="log">（等待工具调用…）</pre>

  <script type="module" src="./main.ts"></script>
</body>
</html>
